version: "1.0"
name: analyzer-agent-config
description: >
  Generic Analyzer (codebase_type-aware migration analysis). Replaces
  LambdaAnalyzer for non-Lambda repos. Auto-classifies the source repo
  via RepoClassifier if codebase_type is not supplied; looks up the
  canonical AWS→Azure mapping from governance/mappings/aws-azure-reference.yaml;
  stops with mapping_not_found error if no template exists for the type.
  Read-only — never modifies source. Returns AnalysisReport/v1 (same schema
  as LambdaAnalyzer so Coder/Tester/Reviewer need no changes).

agent:
  type: Analyzer
  description: Generic AWS→Azure migration analyst (codebase_type-aware, read-only)
  max_file_scan_bytes: 256000
  prompt_file: prompts/analyzer.md
  max_output_tokens: 8000

a2a:
  allowed_recipients: []        # leaf: never dispatches outbound
  max_files_per_dispatch: 60
  timeout_seconds: 120

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 40000
  prompt_injection_block_threshold: high
  allowed_tools: []
  denied_tools: []
