version: "1.0"
name: finops-agent-config
description: >
  FinOpsAnalyst — the happy-path / partial-restriction demo persona (LangGraph).
  A privileged but scoped data-reading agent: it queries the finops.billing
  dataset through the FGAC mediator (ABAC: max CONFIDENTIAL, categories
  [finops, PII]), with customer_email always masked and rows scoped to US
  regions. May dispatch A2A to the Auditor. Exercises the SUCCESS path of every
  control plus legitimate column-masking / row-filtering.

agent:
  type: FinOps
  description: Scoped FinOps billing analyst (LangGraph, data-reading)
  max_file_scan_bytes: 256000
  prompt_file: prompts/finops.md
  max_output_tokens: 4000

a2a:
  allowed_recipients: [Auditor]    # may escalate a cross-dataset question to the Auditor
  max_files_per_dispatch: 10
  timeout_seconds: 60

governance:
  enable_prompt_injection_guard: true
  prompt_injection_block_threshold: high
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 40000
  enable_rogue_detection: true
  allowed_tools: [query_billing, summarize_costs]
  denied_tools: []
  blocked_patterns: ["DROP TABLE", "DELETE FROM", "rm -rf"]
  enable_data_fgac: true
  enable_data_drift: true
  enable_reasoning_guard: true
  enable_reasoning_trace: true
