<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title   { font-size:20px; font-weight:700; fill:#263238; }
    .titsub  { font-size:11.5px; fill:#78909c; }
    .acct    { fill:#fbfdff; stroke:#90a4ae; stroke-width:1.5; stroke-dasharray:7 5; }
    .acct-l  { font-size:12px; font-weight:700; fill:#546e7a; }
    .agent   { fill:#e3f2fd; stroke:#1565c0; stroke-width:2; }
    .choke   { fill:#fff3e0; stroke:#ef6c00; stroke-width:2; }
    .svc     { fill:#eceff4; stroke:#607d8b; stroke-width:1.5; }
    .opt     { fill:#f7f9fa; stroke:#90a4ae; stroke-width:1.5; stroke-dasharray:5 4; }
    .b-t     { font-size:13px; font-weight:700; fill:#1a2b3a; }
    .b-t.ch  { fill:#bf360c; }
    .b-s     { font-size:10px; fill:#546e7a; }
    .flow    { font-size:10px; font-weight:600; fill:#37474f; }
    .bus-l   { font-size:10.5px; font-weight:600; fill:#546e7a; }
    .note    { font-size:10.5px; fill:#78909c; }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 Z" fill="#ef6c00"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 Z" fill="#90a4ae"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="560" fill="#ffffff"/>
  <text class="title" x="40" y="32">Agent-Gov-Sec — AWS Infrastructure View (egress chokepoint + ledger)</text>
  <text class="titsub" x="40" y="52">Reference topology provisioned by cloud_adapters/aws/infra/main.tf — the agent reaches the LLM only through the governed API Gateway → Lambda → Bedrock path.</text>

  <!-- AWS account boundary -->
  <rect class="acct" x="22" y="68" width="1196" height="472" rx="16"/>
  <text class="acct-l" x="42" y="90">AWS account · provider default_tags project = galaxy-rp</text>

  <!-- ── Egress chokepoint lane ── -->
  <rect class="agent" x="44" y="110" width="300" height="106" rx="10"/>
  <text class="b-t" x="58" y="134">Agent runtime (ECS / EKS)</text>
  <text class="b-s" x="58" y="154">framework: langgraph · pydantic · raw</text>
  <text class="b-s" x="58" y="171">+ GuardPipeline + extensions/ + ops/</text>
  <text class="b-s" x="58" y="188">NHI = IAM role  galaxy-rp-&lt;agent&gt;</text>
  <text class="b-s" x="58" y="205">holds the gateway API key only</text>

  <rect class="choke" x="448" y="124" width="196" height="84" rx="10"/>
  <text class="b-t ch" x="462" y="147">API Gateway (REST)</text>
  <text class="b-s" x="462" y="167">resource: /invoke</text>
  <text class="b-s" x="462" y="183">api_key_required</text>
  <text class="b-s" x="462" y="199">+ usage plan</text>

  <rect class="choke" x="724" y="124" width="206" height="84" rx="10"/>
  <text class="b-t ch" x="738" y="147">Lambda  bedrock-proxy</text>
  <text class="b-s" x="738" y="167">injects BEDROCK_MODEL_ID</text>
  <text class="b-s" x="738" y="183">(model fixed server-side)</text>
  <text class="b-s" x="738" y="199">whitelists Converse body</text>

  <rect class="choke" x="1010" y="124" width="190" height="84" rx="10"/>
  <text class="b-t ch" x="1024" y="147">Amazon Bedrock</text>
  <text class="b-s" x="1024" y="167">Converse API</text>
  <text class="b-s" x="1024" y="183">creds = Lambda role</text>
  <text class="b-s" x="1024" y="199">never leave AWS</text>

  <!-- egress arrows + labels -->
  <g stroke="#ef6c00" stroke-width="2" marker-end="url(#a)">
    <line x1="344" y1="166" x2="446" y2="166"/>
    <line x1="644" y1="166" x2="722" y2="166"/>
    <line x1="930" y1="166" x2="1008" y2="166"/>
  </g>
  <text class="flow" x="395" y="156" text-anchor="middle">HTTPS POST</text>
  <text class="flow" x="395" y="184" text-anchor="middle">x-api-key</text>
  <text class="flow" x="683" y="160" text-anchor="middle">AWS_PROXY</text>
  <text class="flow" x="969" y="160" text-anchor="middle">converse()</text>

  <text class="note" x="44" y="238">Every egress call carries x-api-key (validated by the usage plan), x-agent-type, and x-nhi-id.</text>

  <!-- ── Service bus ── -->
  <text class="bus-l" x="44" y="266">Agent ↔ AWS services (each call NHI-scoped via IAM; egress bounded by cloud_adapters/aws/egress.yaml)</text>
  <line x1="194" y1="216" x2="194" y2="282" stroke="#90a4ae" stroke-width="2"/>
  <line x1="152" y1="282" x2="1092" y2="282" stroke="#90a4ae" stroke-width="2"/>
  <g stroke="#90a4ae" stroke-width="2" marker-end="url(#ag)">
    <line x1="152"  y1="282" x2="152"  y2="302"/>
    <line x1="387"  y1="282" x2="387"  y2="302"/>
    <line x1="622"  y1="282" x2="622"  y2="302"/>
    <line x1="857"  y1="282" x2="857"  y2="302"/>
    <line x1="1092" y1="282" x2="1092" y2="302"/>
  </g>

  <!-- Service boxes -->
  <rect class="svc" x="44"    y="304" width="216" height="120" rx="10"/>
  <text class="b-t" x="58" y="328">IAM + STS</text>
  <text class="b-s" x="58" y="349">roles galaxy-rp-&lt;agent&gt;</text>
  <text class="b-s" x="58" y="366">least-privilege policy</text>
  <text class="b-s" x="58" y="383">STS AssumeRole</text>
  <text class="b-s" x="58" y="400">→ temporary credentials</text>

  <rect class="svc" x="278.8" y="304" width="216" height="120" rx="10"/>
  <text class="b-t" x="293" y="328">Secrets Manager</text>
  <text class="b-s" x="293" y="349">galaxy/bedrock-gateway-key</text>
  <text class="b-s" x="293" y="366">supplies the x-api-key</text>
  <text class="b-s" x="293" y="383">5-min TTL cache</text>
  <text class="b-s" x="293" y="400">env fallback offline</text>

  <rect class="svc" x="513.6" y="304" width="216" height="120" rx="10"/>
  <text class="b-t" x="528" y="328">DynamoDB</text>
  <text class="b-s" x="528" y="349">galaxy-trace-ledger</text>
  <text class="b-s" x="528" y="366">PK run_id · SK entry_seq</text>
  <text class="b-s" x="528" y="383">SHA-256 hash chain</text>
  <text class="b-s" x="528" y="400">verify_chain() at end</text>

  <rect class="opt" x="748.4" y="304" width="216" height="120" rx="10"/>
  <text class="b-t" x="762" y="328">X-Ray (via ADOT)</text>
  <text class="b-s" x="762" y="349">OTel spans + events</text>
  <text class="b-s" x="762" y="366">governance.agent_id</text>
  <text class="b-s" x="762" y="383">reasoning.cot / cove</text>
  <text class="b-s" x="762" y="400">optional — no-op if unset</text>

  <rect class="svc" x="983.2" y="304" width="216" height="120" rx="10"/>
  <text class="b-t" x="997" y="328">S3</text>
  <text class="b-s" x="997" y="349">galaxy-rp-runs-</text>
  <text class="b-s" x="997" y="366">&lt;acct&gt;-&lt;region&gt;</text>
  <text class="b-s" x="997" y="383">per-run inputs / outputs</text>

  <!-- Secrets → egress key (dotted) -->
  <line x1="387" y1="304" x2="390" y2="196" stroke="#ef6c00" stroke-width="1.3" stroke-dasharray="3 3"/>

  <!-- footer notes -->
  <text class="note" x="44" y="450">Chokepoint: the model id is injected server-side (callers cannot choose a model); Bedrock runs under the Lambda role, so its credentials</text>
  <text class="note" x="44" y="466">never reach the agent; Bedrock errors are returned to the caller as HTTP 502 with an error body.</text>
  <text class="note" x="44" y="488">Resilience: every adapter imports boto3 lazily and guarded — with no SDK or credentials it degrades to env-var / in-memory mode.</text>
  <text class="note" x="44" y="514">Legend:  orange = governed egress chokepoint  ·  blue = agent compute (NHI)  ·  grey = AWS service  ·  dashed = optional (tracing)  ·  dotted = Secrets Manager supplies the x-api-key.</text>
</svg>
