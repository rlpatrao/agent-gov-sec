version: "1.0"
name: discovery-grapher-agent-config
description: >
  Discovery Grapher — builds the module-to-resource dependency graph.
  Deterministic AST walk (imports + boto3 call sites) runs first; the LLM
  resolves only the ambiguous call sites that couldn't be statically resolved.
  Returns a DependencyGraph (JSON) that the BRD stage consumes.

agent:
  type: DiscoveryGrapher
  description: Builds the AWS dependency graph from source using deterministic AST + LLM disambiguation
  max_file_scan_bytes: 100000
  prompt_file: prompts/discovery_grapher.md
  max_output_tokens: 4000

a2a:
  allowed_recipients: []
  max_files_per_dispatch: 0
  timeout_seconds: 180

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 32000
  prompt_injection_block_threshold: high
  allowed_tools: []
  denied_tools: []
