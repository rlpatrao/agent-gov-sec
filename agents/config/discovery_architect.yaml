version: "1.0"
name: discovery-architect-agent-config
description: >
  Discovery Architect — produces per-module and system-level Azure target
  design documents (markdown). Required sections: Function Plan, Trigger Bindings,
  State Mapping, Secrets, Identity, IaC (Bicep), Observability.
  Runs per-module tasks in parallel (up to 4 concurrent).
  Output is consumed by the Stories stage.

agent:
  type: DiscoveryArchitect
  description: Produces Azure target design markdown for each module and the system
  max_file_scan_bytes: 256000
  prompt_file: prompts/discovery_architect.md
  max_output_tokens: 8000

a2a:
  allowed_recipients: []
  max_files_per_dispatch: 0
  timeout_seconds: 300

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 60000
  prompt_injection_block_threshold: high
  allowed_tools: []
  denied_tools: []
