version: "1.0"
name: coder-agent-config
description: >
  Coder (TDD-first migration generator). Writes Azure Functions code +
  unit tests + Bicep IaC into a per-module sandbox. THE first true tool
  agent in Galaxy — write_file and apply_patch are sandboxed by closure
  to MIGRATED_DIR + reports/ at construction; CapabilityGuardMiddleware
  refuses any tool call whose name isn't in allowed_tools below.

agent:
  type: Coder
  description: TDD-first legacy → Azure migration code generator (stack-aware)
  max_file_scan_bytes: 256000
  prompt_file: prompts/coder.md
  # Universal quality/security/testing rules prepended to every per-stack prompt.
  shared_prompt_files:
    - prompts/_shared/coder_rules.md
  # Coder emits a lot: tests, source, Bicep, plus a summary message.
  # The actual files are written via tools, not in the response — but the
  # response still carries the design summary, which can run long.
  max_output_tokens: 12000

a2a:
  allowed_recipients: []           # leaf today; the orchestrator dispatches Coder→Tester
  max_files_per_dispatch: 0
  timeout_seconds: 300             # generation + multiple tool calls is slow

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  # Coder sees: analysis + sprint contract + original Lambda source + previous
  # failures (on retry). Largest budget after Reviewer.
  context_budget_tokens: 64000
  # Hard allow-list. Every callable passed as tools=[...] to build_agent
  # must have its FunctionTool.name listed here. Sandbox enforcement
  # ALSO happens at the tool boundary (closure-bound roots) — this is the
  # second line of defence: CapabilityGuardMiddleware never lets a tool
  # NOT named here be invoked, even if MAF somehow ended up with one.
  # Pipeline agents receive trusted LLM-generated markdown (analysis reports,
  # code fences, --- separators). Block only on HIGH (actual injection patterns)
  # not MEDIUM (library false-positives on markdown formatting).
  prompt_injection_block_threshold: high
  allowed_tools:
    - write_file
    - apply_patch
    - validate_bicep
  denied_tools: []
