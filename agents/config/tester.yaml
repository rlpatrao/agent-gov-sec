version: "1.0"
name: tester-agent-config
description: >
  Tester (3-layer evaluation). Runs the unit test suite via a sandboxed
  pytest subprocess (cwd locked to test_dir, env scrubbed of Azure/APIM
  secrets, 120s timeout). LLM does Layer 2 SDK-mock auditing and Layer 3
  contract checking on top of the run_tests pass/fail signal. Returns a
  typed TestReport with verdict + structured failures the Coder can
  consume on retry.

agent:
  type: Tester
  description: 3-layer evaluator with sandboxed pytest runner
  max_file_scan_bytes: 256000
  prompt_file: prompts/tester.md
  max_output_tokens: 8000

a2a:
  allowed_recipients: []
  max_files_per_dispatch: 0
  timeout_seconds: 240             # pytest subprocess can run for 120s; LLM reasoning on top

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 48000
  prompt_injection_block_threshold: high
  allowed_tools:
    - run_tests
  denied_tools: []
