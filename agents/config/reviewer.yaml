version: "1.0"
name: reviewer-agent-config
description: >
  Reviewer (final code-review quality gate). Receives migrated source +
  analysis + tests + sprint contract via A2A; returns a typed ReviewReport
  with recommendation (APPROVE / CHANGES_REQUESTED / BLOCKED), confidence
  0-100, and a list of blocking issues, plus the full review markdown.
  Read-only — no tools wired; the host inlines all input content into the
  prompt before the LLM call.

agent:
  type: Reviewer
  description: 8-point code-review quality gate (read-only)
  max_file_scan_bytes: 256000
  prompt_file: prompts/reviewer.md
  # Review markdown is structured but moderate-length. 6K leaves headroom
  # for a long blocking-issues list without truncation.
  max_output_tokens: 6000

a2a:
  allowed_recipients: []           # leaf agent today; never dispatches outbound
  max_files_per_dispatch: 0
  timeout_seconds: 180             # large prompts (analysis + source + tests)

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  credential_mode: redact
  enable_context_budget: true
  # Reviewer sees the most context of any agent (analysis + source + tests
  # + contract + infra). Largest budget in the platform.
  context_budget_tokens: 64000
  prompt_injection_block_threshold: high
