version: "1.0"
name: security-reviewer-agent-config
description: >
  SecurityReviewer (OWASP-based security gate). Runs after Reviewer.
  Domain code executes a deterministic regex security scan over the
  migrated source FIRST; the findings are inlined into the prompt and the
  LLM does the deep analysis (logic vulns, IDOR, auth bypass, Azure-specific
  misuse). Returns a typed SecurityReviewReport with BLOCK/WARN/INFO counts
  + recommendation. Read-only.

agent:
  type: SecurityReviewer
  description: OWASP-based security review (read-only)
  max_file_scan_bytes: 256000
  prompt_file: prompts/security_reviewer.md
  max_output_tokens: 6000

a2a:
  allowed_recipients: []
  max_files_per_dispatch: 0
  timeout_seconds: 180

governance:
  enable_rogue_detection: true
  enable_prompt_injection_guard: true
  enable_credential_redactor: true
  # Security review prompts will *intentionally* include strings that look
  # like secrets — that's the whole point. Use redact mode (don't deny) so
  # the agent can still reason about leaked-secret patterns; the redactor
  # masks the actual literal values before the LLM sees them.
  credential_mode: redact
  enable_context_budget: true
  context_budget_tokens: 48000
  prompt_injection_block_threshold: high
