# Egress allow-list (GCP) — loaded by governance.guards.egress.load_egress_policy()
# and passed into agent_os.egress_policy.EgressPolicy. Sibling of
# adapters/azure/egress.yaml and adapters/aws/egress.yaml; selected when
# CLOUD_PROVIDER=gcp.
#
# Loader format is the minimal stdlib parser in
# agent_os.egress_policy.EgressPolicy.load_from_yaml:
#   - protocol must be `tcp` or `udp` (port 443 = HTTPS)
#   - one rule per `- domain:` block
#   - other top-level keys (version/name/description) are ignored
#
# Regional hosts assume us-central1 — adjust to your VERTEX_AI_LOCATION.

rules:
  # Apigee → Vertex AI (primary LLM egress when APIGEE_VERTEX_ENDPOINT is set)
  - domain: example-vertex.apigee.net
    ports: [443]
    protocol: tcp
    action: allow

  # Vertex AI (direct, ADC/OAuth) — fallback when no Apigee endpoint
  - domain: us-central1-aiplatform.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow

  # Vertex AI global endpoint
  - domain: aiplatform.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow

  # Secret Manager data plane
  - domain: secretmanager.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow

  # IAM Credentials — per-agent SA impersonation (NHI)
  - domain: iamcredentials.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow

  # OAuth2 token endpoint (ADC token exchange)
  - domain: oauth2.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow

  # Cloud Trace ingestion (via the OTel collector → Cloud Trace)
  - domain: cloudtrace.googleapis.com
    ports: [443]
    protocol: tcp
    action: allow
